apply_net_commands:
  builtin: []
curthooks_commands:
  001-mount-cdrom:
  - mount
  - --bind
  - /cdrom
  - /target/cdrom
  builtin:
  - curtin
  - curthooks
debconf_selections:
  subiquity: ''
extract_commands:
  builtin:
  - curtin
  - extract
grub:
  probe_additional_os: true
  terminal: unmodified
hook_commands:
  builtin:
  - curtin
  - hook
install:
  error_tarfile: /var/log/curtin/curtin-error-logs.tar
  log_file: /var/log/curtin/install.log
  save_install_config: /var/log/installer/curtin-install-cfg.yaml
  save_install_log: /var/log/installer/curtin-install.log
  target: /target
  unmount: disabled
kernel:
  package: linux-generic
late_commands:
  builtin: []
network_commands:
  builtin:
  - curtin
  - net-meta
  - auto
partitioning_commands:
  builtin:
  - curtin
  - block-meta
  - simple
pollinate:
  user_agent:
    subiquity: 22.04.2_3359
proxy: {}
reporting:
  subiquity:
    identifier: curtin_event.1861.3
    type: journald
sources:
  00_cmdline:
    type: tgz
    uri: cp:///tmp/tmpwpzxoocz/mount
stages:
- early
- partitioning
- extract
- curthooks
- hook
- late
storage:
  config:
  - grub_device: true
    id: disk-sda
    name: ''
    path: /dev/sda
    preserve: false
    ptable: gpt
    serial: VBOX_HARDDISK_VB6bd31e9e-257ccfae
    type: disk
    wipe: superblock
  - device: disk-sda
    flag: bios_grub
    grub_device: false
    id: partition-0
    number: 1
    preserve: false
    size: 1048576
    type: partition
  - device: disk-sda
    flag: ''
    grub_device: false
    id: partition-1
    number: 2
    preserve: false
    size: 1902116864
    type: partition
    wipe: superblock
  - fstype: ext4
    id: format-0
    preserve: false
    type: format
    volume: partition-1
  - device: disk-sda
    flag: ''
    grub_device: false
    id: partition-2
    number: 3
    preserve: false
    size: 19569573888
    type: partition
    wipe: superblock
  - devices:
    - partition-2
    id: lvm_volgroup-0
    name: ubuntu-vg
    preserve: false
    type: lvm_volgroup
  - id: lvm_partition-0
    name: ubuntu-lv
    preserve: false
    size: 10737418240B
    type: lvm_partition
    volgroup: lvm_volgroup-0
    wipe: superblock
  - fstype: ext4
    id: format-1
    preserve: false
    type: format
    volume: lvm_partition-0
  - device: format-1
    id: mount-1
    path: /
    type: mount
  - device: format-0
    id: mount-0
    path: /boot
    type: mount
  version: 1
write_files:
  etc_default_keyboard:
    content: '# KEYBOARD CONFIGURATION FILE


      # Consult the keyboard(5) manual page.


      XKBMODEL="pc105"

      XKBLAYOUT="us"

      XKBVARIANT=""

      XKBOPTIONS=""


      BACKSPACE="guess"

      '
    path: etc/default/keyboard
    permissions: 420
  etc_machine_id:
    content: '38f6670707da49ad9b9320699854c028

      '
    path: etc/machine-id
    permissions: 292
  etc_netplan_installer:
    content: "# This is the network config written by 'subiquity'\nnetwork:\n  ethernets:\n\
      \    enp0s3:\n      dhcp4: true\n  version: 2\n"
    path: etc/netplan/00-installer-config.yaml
  md5check:
    content: "{\n  \"checksum_missmatch\": [\n],\n  \"result\": \"pass\"\n}\n"
    path: var/log/installer/casper-md5check.json
    permissions: 420
  media_info:
    content: Ubuntu-Server 22.04 LTS "Jammy Jellyfish" - Release amd64 (20220421)
    path: var/log/installer/media-info
    permissions: 420
  nonet:
    content: 'network: {config: disabled}

      '
    path: etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
